name: recent activity

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

jobs:
  recent-activity:
    name: update recent activity
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: Readme-Workflows/recent-activity@v2.4.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
